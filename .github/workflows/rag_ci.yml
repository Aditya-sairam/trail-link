name: TrialLink RAG Pipeline CI

on:
  push:
    branches:
      - Swarali-demo
    paths:
      - "models/**"                              # any change in models folder
      - "infra/pulumi_stacks/modelPipelineStack.py"  # specific file in infra

env:
  GCP_PROJECT_ID:              ${{ vars.GCP_PROJECT_ID }}
  MODEL_PROJECT_ID:            ${{ vars.MODEL_PROJECT_ID }}
  MODEL_PROJECT_NUMBER:        ${{ secrets.MODEL_PROJECT_NUMBER }}
  MEDGEMMA_ENDPOINT_ID:        ${{ secrets.MEDGEMMA_ENDPOINT_ID }}
  MEDGEMMA_DEDICATED_DNS:      ${{ vars.MEDGEMMA_DEDICATED_DNS }}
  GCP_REGION:                  ${{ vars.GCP_REGION }}
  FIRESTORE_DATABASE:          ${{ vars.FIRESTORE_DATABASE }}
  VECTOR_SEARCH_ENDPOINT_ID:   ${{ vars.VECTOR_SEARCH_ENDPOINT_ID }}
  DEPLOYED_INDEX_ID:           ${{ vars.DEPLOYED_INDEX_ID }}
  MLFLOW_TRACKING_URI:         databricks
  DATABRICKS_HOST:             ${{ vars.DATABRICKS_HOST }}
  DATABRICKS_TOKEN:            ${{ secrets.DATABRICKS_TOKEN }}
  PULUMI_BACKEND_URL:          gs://pulumi-state-project-61ec6551-6e90-478b-825
  PULUMI_CONFIG_PASSPHRASE:    ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
  ENABLE_INPUT_LLM_GUARDRAIL:  "true"
  ENABLE_OUTPUT_LLM_GUARDRAIL: "true"

permissions:
  issues: write
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1: RAG Evaluation — validation, bias detection, rollback check
  # ═══════════════════════════════════════════════════════════════════════════
  rag-evaluation:
    name: RAG Evaluation + Validation + Bias + Rollback
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            mlflow \
            databricks-sdk \
            google-cloud-aiplatform \
            google-cloud-firestore \
            google-cloud-discoveryengine \
            google-auth \
            vertexai \
            functions-framework==3.* \
            python-dotenv \
            requests

      - name: Run RAG pipeline evaluation
        run: python tests/test_rag_pipeline.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-test-results
          path: tests/test_results/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2: Deploy — only runs if evaluation passes
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy with Pulumi
    runs-on: ubuntu-latest
    needs: rag-evaluation
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pulumi
        run: pip install pulumi

      - name: Login to Pulumi GCS backend
        run: pulumi login gs://pulumi-state-project-61ec6551-6e90-478b-825

      - name: Refresh Pulumi state
        working-directory: ./infra/pulumi_stacks
        run: pulumi refresh --yes --stack dev

      - name: Deploy with Pulumi
        working-directory: ./infra/pulumi_stacks
        continue-on-error: true 
        run: pulumi up --yes --stack dev --exclude urn:pulumi:dev::clinical-trial-platform::gcp:vertex/aiEndpointWithModelGardenDeployment:AiEndpointWithModelGardenDeployment::deploy --exclude urn:pulumi:dev::clinical-trial-platform::gcp:firestore/database:Database::dev-clinical-trials-suggestions-db


  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3: Alert on failure — GitHub Issue + @mention team
  # ═══════════════════════════════════════════════════════════════════════════
  alert-on-failure:
    name: Create Alert on Failure
    runs-on: ubuntu-latest
    needs: [rag-evaluation, deploy]
    if: always() && (needs.rag-evaluation.result == 'failure' || needs.deploy.result == 'failure')

    permissions:
      issues: write

    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          EVAL_RESULT: ${{ needs.rag-evaluation.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        with:
          script: |
            const evalFailed   = process.env.EVAL_RESULT === 'failure';
            const deployFailed = process.env.DEPLOY_RESULT === 'failure';

            let failStage = '';
            if (evalFailed) {
              failStage = '❌ RAG Evaluation Failed — Deployment Blocked';
            } else if (deployFailed) {
              failStage = '❌ Pulumi Deployment Failed — Evaluation Passed';
            }

            const title = `🚨 ${failStage} — ${context.sha.slice(0, 7)}`;

            const body = [
              `## RAG Pipeline CI Failure`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| **Branch** | \`${context.ref}\` |`,
              `| **Commit** | [\`${context.sha.slice(0, 7)}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}) |`,
              `| **Author** | @${context.actor} |`,
              `| **CI Run** | [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) |`,
              `| **MLflow** | [View experiments](${process.env.DATABRICKS_HOST}/ml/experiments) |`,
              `| **Evaluation** | ${evalFailed ? '❌ Failed' : '✅ Passed'} |`,
              `| **Deployment** | ${deployFailed ? '❌ Failed' : evalFailed ? '⛔ Blocked' : '✅ Passed'} |`,
              ``,
              evalFailed
                ? [
                    `### ⛔ Deployment Blocked — Evaluation Failed`,
                    ``,
                    `The RAG evaluation did not pass. Deployment was never attempted.`,
                    ``,
                    `**Possible causes:**`,
                    `- **Validation threshold failed** — success_rate or avg_matched below minimum`,
                    `- **Bias detected** — demographic slice performing significantly worse than average`,
                    `- **Rollback triggered** — performance degradation vs previous MLflow run`,
                    `- **Guardrail errors** — input/output guardrail failures`,
                    `- **Infrastructure error** — GCP auth, endpoint down, Firestore unreachable`,
                  ].join('\n')
                : [
                    `### ❌ Deployment Failed — Evaluation Passed`,
                    ``,
                    `The RAG evaluation passed all checks, but the Pulumi deployment failed.`,
                    `The previous production version is still live (no rollback needed).`,
                    ``,
                    `**Possible causes:**`,
                    `- IAM permission errors (service account missing roles)`,
                    `- Pulumi state conflict`,
                    `- GCP resource quota or API errors`,
                  ].join('\n'),
              ``,
              `### Action required:`,
              `1. Check the [CI logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `2. Download test artifacts from the CI run for per-patient details`,
              `3. Review the MLflow run for metrics and logged artifacts`,
              `4. Fix the issue and re-push to trigger a new CI run`,
              ``,
              `cc @Aditya-sairam @ItSwara @Sannn7 @Baidyam @Vaishnavi0805`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['ci-failure', 'rag-pipeline'],
              assignees: [context.actor],
            });


