name: TrialLink RAG Pipeline CI

on:
  push:
    branches:
      - sanika-swarali-rag

env:
  GCP_PROJECT_ID:            ${{ vars.GCP_PROJECT_ID }}
  MODEL_PROJECT_ID:          ${{ vars.MODEL_PROJECT_ID }}
  MEDGEMMA_ENDPOINT_ID:      ${{ secrets.MEDGEMMA_ENDPOINT_ID }}
  GCP_REGION:                ${{ vars.GCP_REGION }}
  FIRESTORE_DATABASE:        ${{ vars.FIRESTORE_DATABASE }}
  VECTOR_SEARCH_ENDPOINT_ID: ${{ vars.VECTOR_SEARCH_ENDPOINT_ID }}
  DEPLOYED_INDEX_ID:         ${{ vars.DEPLOYED_INDEX_ID }}
  MLFLOW_TRACKING_URI:       databricks
  DATABRICKS_HOST:           ${{ vars.DATABRICKS_HOST }}
  DATABRICKS_TOKEN:          ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  deploy-and-test:
    name: Deploy + RAG Evaluation + Rollback on Failure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            mlflow \
            pulumi \
            google-cloud-aiplatform \
            google-cloud-firestore \
            google-cloud-discoveryengine \
            vertexai \
            functions-framework==3.*

      # ── Snapshot state BEFORE deploy ──────────────────────────────────────
      - name: Snapshot pre-deploy Pulumi state
        working-directory: ./infra
        run: pulumi stack export > /tmp/pulumi_pre_deploy.json
        env:
          PULUMI_BACKEND_URL: gs://your-gcs-bucket-name

      # ── Deploy ────────────────────────────────────────────────────────────
      - name: Deploy with Pulumi
        working-directory: ./infra
        run: pulumi up --yes 
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      # ── Test ──────────────────────────────────────────────────────────────
      - name: Run test_rag_pipeline.py
        id: rag_test
        run: python tests/test_rag_pipeline.py

      # ── Rollback if tests failed ──────────────────────────────────────────
      - name: Rollback Pulumi deployment
        if: failure() && steps.rag_test.outcome == 'failure'
        working-directory: ./infra
        run: |
          echo "RAG tests failed — rolling back to pre-deploy state"
          echo "Commit : ${{ github.sha }}"
          echo "Author : ${{ github.actor }}"
          pulumi stack import  --file /tmp/pulumi_pre_deploy.json
          pulumi up --yes 
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      # ── Notify ───────────────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "Pipeline failed"
          echo "Branch : sanika-swarali-rag"
          echo "Commit : ${{ github.sha }}"
          echo "Author : ${{ github.actor }}"
          echo "MLflow : ${{ vars.DATABRICKS_HOST }}/ml/experiments"