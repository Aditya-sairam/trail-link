name: Pulumi Deployment Test

on:
  push:
    branches:
      - pulumi-actions-test-branch

env:
  PULUMI_BACKEND_URL:       gs://pulumi-state-project-1e322b00-efe1-41f8-8d9
  PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

jobs:
  pulumi-deploy:
    name: Test Pulumi Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pulumi
        run: pip install pulumi pulumi-gcp

      - name: Login to Pulumi GCS backend
        run: pulumi login gs://pulumi-state-project-1e322b00-efe1-41f8-8d9

      - name: Pulumi Preview (dry run)
        working-directory: ./infra/pulumi_stacks
        continue-on-error: true
        run: pulumi up --yes --stack dev

      # Uncomment below once preview looks good
      # - name: Pulumi Deploy
      #   working-directory: ./infra/pulumi_stacks
      #   run: pulumi up --yes --stack dev