name: TrialLink Sensitivity Analysis

# PDF requirement: hyperparameter tuning to optimize model performance
# Triggered manually — too expensive for every push (9 runs x 13 patients)
# Run this when RAG configuration changes or hyperparameter tuning is needed

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running sensitivity analysis?"
        required: true
        default: "Hyperparameter tuning after RAG changes"

env:
  GCP_PROJECT_ID:            ${{ vars.GCP_PROJECT_ID }}
  MODEL_PROJECT_ID:          ${{ vars.MODEL_PROJECT_ID }}
  MEDGEMMA_ENDPOINT_ID:      ${{ secrets.MEDGEMMA_ENDPOINT_ID }}
  GCP_REGION:                ${{ vars.GCP_REGION }}
  FIRESTORE_DATABASE:        ${{ vars.FIRESTORE_DATABASE }}
  VECTOR_SEARCH_ENDPOINT_ID: ${{ vars.VECTOR_SEARCH_ENDPOINT_ID }}
  DEPLOYED_INDEX_ID:         ${{ vars.DEPLOYED_INDEX_ID }}
  DATABRICKS_HOST:           ${{ vars.DATABRICKS_HOST }}
  DATABRICKS_TOKEN:          ${{ secrets.DATABRICKS_TOKEN }}
  MLFLOW_EXPERIMENT_NAME:    "/Users/degaonkar.sw@northeastern.edu/triallink-sensitivity-analysis"

jobs:
  sensitivity-analysis:
    name: Run Hyperparameter Sensitivity Analysis
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate to GCP ──────────────────────────────────────────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 4. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            mlflow \
            google-cloud-aiplatform \
            google-cloud-firestore \
            google-cloud-discoveryengine \
            vertexai

      # ── 5. Log run reason ───────────────────────────────────────────────────
      - name: Log run reason
        run: |
          echo "Sensitivity analysis triggered by: ${{ github.actor }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Commit: ${{ github.sha }}"

      # ── 6. Run sensitivity analysis → log to Databricks MLflow ─────────────
      - name: Run test_sensitivity_analysis.py
        run: python tests/test_sensitivity_analysis.py

      # ── 7. Notify on failure ─────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "Sensitivity analysis failed"
          echo "Triggered by : ${{ github.actor }}"
          echo "Reason       : ${{ github.event.inputs.reason }}"
          echo "Commit       : ${{ github.sha }}"
          echo "View MLflow  : ${{ vars.DATABRICKS_HOST }}/ml/experiments"